<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" href="./favicon.png" type="image/png" />
  <title>Indhur Farms - Fresh Natural Farm Products</title>
  <meta name="description"
    content="Farm-fresh natural vegetables, fruits, dairy, spices and more delivered to your doorstep from Indhur Farms." />
  <meta name="author" content="Indhur Farms" />
  <meta property="og:title" content="Indhur Farms - Fresh Natural Farm Products" />
  <meta property="og:description"
    content="Farm-fresh natural vegetables, fruits, dairy, spices and more delivered to your doorstep from Indhur Farms." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="./favicon.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@IndhurFarms" />
  <meta name="twitter:image" content="./favicon.png" />
</head>

<body>
  <div id="root"></div>
  <script>
    window.addEventListener('error', function (event) {
      if (event.message && (event.message.includes('ResizeObserver loop completed') || event.message.includes('ResizeObserver loop limit exceeded'))) {
        return;
      }
      document.body.innerHTML += '<div style="color:red;font-size:24px;padding:20px;z-index:99999;position:fixed;background:white;top:0;left:0;width:100%;height:100%;">RAW HTML ERROR: ' + event.message + '<br>' + event.filename + ':' + event.lineno + '</div>';
    });
    window.addEventListener('unhandledrejection', function (event) {
      document.body.innerHTML += '<div style="color:red;font-size:24px;padding:20px;z-index:99999;position:fixed;background:white;top:0;left:0;width:100%;height:100%;">RAW HTML PROMISE ERROR: ' + (event.reason ? event.reason.message || event.reason : 'Unknown') + '</div>';
    });
  </script>
  <script type="module" src="./src/main.tsx"></script>
</body>

</html>
